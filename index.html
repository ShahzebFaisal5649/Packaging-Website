<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NovaPack — Premium Custom Packaging</title>
    <meta name="description" content="Premium custom packaging and boxes by NovaPack. Fast turnaround, industry-grade quality, and modern design tools." />
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.height = '100%';
        errorDiv.style.backgroundColor = '#fff1f0';
        errorDiv.style.color = '#ff4d4f';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.fontSize = '14px';
        errorDiv.style.overflow = 'auto';
        errorDiv.innerHTML = '<h1>JS Error Caught!</h1>' + 
          '<p><b>Message:</b> ' + msg + '</p>' +
          '<p><b>URL:</b> ' + url + '</p>' +
          '<p><b>Line:</b> ' + lineNo + '</p>' +
          '<pre>' + (error ? error.stack : '') + '</pre>';
        document.body.appendChild(errorDiv);
        return false;
      };
      window.onunhandledrejection = function(event) {
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.height = '100%';
        errorDiv.style.backgroundColor = '#fff1f0';
        errorDiv.style.color = '#ff4d4f';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.fontSize = '14px';
        errorDiv.innerHTML = '<h1>Unhandled Promise Rejection!</h1>' + 
          '<p><b>Reason:</b> ' + event.reason + '</p>';
        document.body.appendChild(errorDiv);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
